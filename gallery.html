<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - BeachGirl.pics</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(0,0,0,0.3);
            padding: 20px 0;
            text-align: center;
        }
        
        .logo {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .nav {
            margin-top: 15px;
        }
        
        .nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            transition: background 0.3s;
            display: inline-block;
        }
        
        .nav a:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .gallery-info {
            text-align: center;
            margin: 30px 0;
        }
        
        .gallery-info h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .gallery-info p {
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        
        .photo-card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s;
            position: relative;
        }
        
        .photo-card:hover {
            transform: scale(1.05);
        }
        
        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        
        .photo-info {
            padding: 10px;
            text-align: center;
        }
        
        .new-label {
            background: #ff4757;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
            display: inline-block;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .language-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .language-selector select {
            padding: 8px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }
        
        .ad-banner {
            text-align: center;
            margin: 20px 0;
            min-height: 90px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .placeholder-img {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2em;
        }
        
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
            
            .gallery-info h1 {
                font-size: 2em;
            }
            
            .nav a {
                margin: 5px;
                padding: 6px 12px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <!-- Language Selector -->
    <div class="language-selector">
        <select id="languageSelect">
            <option value="es">Español</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="fr">Français</option>
        </select>
    </div>

    <div class="header">
        <div class="logo">🌴 BeachGirl.pics 🌴</div>
        <div class="nav">
            <a href="/">Home</a>
            <a href="/gallery.html">Gallery</a>
            <a href="/premium.html">Premium</a>
            <a href="/videos.html">Videos</a>
            <a href="/subscription.html">Subscribe</a>
        </div>
    </div>

    <div class="container">
        <div class="gallery-info">
            <h1 id="galleryTitle">📸 Free Gallery</h1>
            <p id="galleryDesc">Beautiful beach photos - Updated daily</p>
            <p id="totalPhotos">Total photos: <span id="photoCount">Loading...</span></p>
        </div>

        <!-- Ad Banner -->
        <div class="ad-banner" id="adBanner">
            <p>Advertisement Space</p>
        </div>

        <div id="loadingSection" class="loading">
            <div class="spinner"></div>
            <p id="loadingText">Loading gallery...</p>
        </div>

        <div class="gallery-grid" id="galleryGrid" style="display: none;"></div>
    </div>

    <!-- Content Data -->
    <script>
        // Load content data with error handling
        function loadScript(src) {
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = () => {
                    console.log(`✅ Loaded: ${src}`);
                    resolve();
                };
                script.onerror = () => {
                    console.warn(`⚠️ Failed to load: ${src}`);
                    resolve(); // Continue even if file doesn't exist
                };
                document.head.appendChild(script);
            });
        }
        
        // Load content data
        loadScript('content-data2.js').then(() => {
            loadGallery();
        });
    </script>

    <script>
        // Translations
        const translations = {
            es: {
                galleryTitle: "📸 Galería Gratuita",
                galleryDesc: "Hermosas fotos de playa - Actualizadas diariamente",
                totalPhotos: "Total de fotos:",
                loadingText: "Cargando galería...",
                newLabel: "¡NUEVO!",
                errorLoading: "Error al cargar la galería"
            },
            en: {
                galleryTitle: "📸 Free Gallery",
                galleryDesc: "Beautiful beach photos - Updated daily",
                totalPhotos: "Total photos:",
                loadingText: "Loading gallery...",
                newLabel: "NEW!",
                errorLoading: "Error loading gallery"
            },
            de: {
                galleryTitle: "📸 Kostenlose Galerie",
                galleryDesc: "Schöne Strandfotos - Täglich aktualisiert",
                totalPhotos: "Gesamtfotos:",
                loadingText: "Galerie wird geladen...",
                newLabel: "NEU!",
                errorLoading: "Fehler beim Laden der Galerie"
            },
            it: {
                galleryTitle: "📸 Galleria Gratuita",
                galleryDesc: "Belle foto di spiaggia - Aggiornate quotidianamente",
                totalPhotos: "Foto totali:",
                loadingText: "Caricamento galleria...",
                newLabel: "NUOVO!",
                errorLoading: "Errore nel caricamento della galleria"
            },
            fr: {
                galleryTitle: "📸 Galerie Gratuite",
                galleryDesc: "Belles photos de plage - Mise à jour quotidienne",
                totalPhotos: "Total des photos:",
                loadingText: "Chargement de la galerie...",
                newLabel: "NOUVEAU!",
                errorLoading: "Erreur lors du chargement de la galerie"
            }
        };

        let currentLanguage = 'es';
        let allPhotos = [];

        // Create placeholder image
        function createPlaceholder(text = "🌴") {
            const div = document.createElement('div');
            div.className = 'placeholder-img';
            div.textContent = text;
            return div;
        }

        // Language functions
        function changeLanguage() {
            currentLanguage = document.getElementById('languageSelect').value;
            const t = translations[currentLanguage] || translations.en;
            
            document.getElementById('galleryTitle').textContent = t.galleryTitle;
            document.getElementById('galleryDesc').textContent = t.galleryDesc;
            document.getElementById('loadingText').textContent = t.loadingText;
            
            const totalPhotosText = document.getElementById('totalPhotos');
            if (totalPhotosText) {
                totalPhotosText.innerHTML = t.totalPhotos + ' <span id="photoCount">' + allPhotos.length + '</span>';
            }
            
            // Update NEW labels
            const newLabels = document.querySelectorAll('.new-label');
            newLabels.forEach(label => {
                label.textContent = t.newLabel;
            });
            
            localStorage.setItem('preferred-language', currentLanguage);
        }

        // Shuffle array function
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Load and display photos
        function loadGallery() {
            try {
                // Get photos from content-data2.js
                if (typeof FULL_IMAGES_POOL !== 'undefined') {
                    allPhotos = FULL_IMAGES_POOL;
                    console.log(`📸 BeachGirl.pics: Loaded ${allPhotos.length} photos from FULL_IMAGES_POOL`);
                    
                    // Randomize photos daily
                    const today = new Date().toDateString();
                    const savedDate = localStorage.getItem('gallery-date');
                    
                    if (savedDate !== today) {
                        allPhotos = shuffleArray(allPhotos);
                        localStorage.setItem('gallery-date', today);
                        console.log('🔄 Daily shuffle applied');
                    }
                    
                    displayPhotos();
                } else {
                    // Use placeholder images if content not found
                    console.warn('⚠️ FULL_IMAGES_POOL not found, using placeholders');
                    allPhotos = Array(50).fill(null).map((_, i) => `placeholder-${i}`);
                    displayPhotos();
                }
            } catch (error) {
                console.error('Error loading gallery:', error);
                const t = translations[currentLanguage] || translations.en;
                document.getElementById('loadingText').textContent = t.errorLoading;
            }
        }

        function displayPhotos() {
            const galleryGrid = document.getElementById('galleryGrid');
            const photoCountElement = document.getElementById('photoCount');
            const t = translations[currentLanguage] || translations.en;
            
            // Update photo count
            photoCountElement.textContent = allPhotos.length;
            
            // Display photos (first 50 for performance)
            const photosToShow = allPhotos.slice(0, 50);
            
            galleryGrid.innerHTML = '';
            
            photosToShow.forEach((photo, index) => {
                const photoCard = document.createElement('div');
                photoCard.className = 'photo-card';
                
                if (photo.includes('placeholder')) {
                    // Create placeholder
                    const placeholder = createPlaceholder(`🌴 ${index + 1}`);
                    photoCard.appendChild(placeholder);
                } else {
                    // Create image
                    const img = document.createElement('img');
                    img.src = photo;
                    img.alt = `Beach Photo ${index + 1}`;
                    img.loading = 'lazy';
                    
                    // Add error handler
                    img.onerror = function() {
                        const placeholder = createPlaceholder(`🌴 ${index + 1}`);
                        this.parentElement.replaceChild(placeholder, this);
                    };
                    
                    photoCard.appendChild(img);
                }
                
                const photoInfo = document.createElement('div');
                photoInfo.className = 'photo-info';
                
                // Mark first 15 as NEW
                if (index < 15) {
                    const newLabel = document.createElement('span');
                    newLabel.className = 'new-label';
                    newLabel.textContent = t.newLabel;
                    photoInfo.appendChild(newLabel);
                }
                
                photoCard.appendChild(photoInfo);
                galleryGrid.appendChild(photoCard);
            });
            
            // Hide loading, show gallery
            document.getElementById('loadingSection').style.display = 'none';
            galleryGrid.style.display = 'grid';
            
            console.log(`✅ BeachGirl.pics: Displayed ${photosToShow.length} photos`);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            const savedLang = localStorage.getItem('preferred-language') || 'es';
            document.getElementById('languageSelect').value = savedLang;
            changeLanguage();
            
            document.getElementById('languageSelect').addEventListener('change', changeLanguage);
            
            console.log('🌴 BeachGirl.pics Gallery page initialized');
        });
    </script>
</body>
</html>
