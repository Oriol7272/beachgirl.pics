<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeachGirl.pics</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; 
            font-family: Arial, sans-serif;
        }
        nav { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            padding: 20px; 
            background: rgba(0,0,0,0.3); 
        }
        nav a { 
            color: white; 
            text-decoration: none; 
            font-size: 20px; 
        }
        h1 { 
            font-family: 'Alex Brush', cursive; 
            font-size: 100px; 
            text-align: center; 
            margin: 40px 0 20px; 
        }
        p { 
            text-align: center; 
            font-size: 30px; 
            margin-bottom: 40px; 
        }
        .carousel, .gallery { 
            max-width: 1200px; 
            margin: 40px auto; 
            padding: 20px; 
        }
        .carousel-track, .gallery-grid { 
            display: flex; 
            gap: 20px; 
            flex-wrap: wrap; 
            justify-content: center; 
        }
        .img-box { 
            width: 250px; 
            height: 300px; 
            background: rgba(255,255,255,0.1); 
            border-radius: 10px; 
            overflow: hidden; 
        }
        .img-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">Premium</a>
        <a href="#">Videos</a>
        <a href="#">Subscriptions</a>
    </nav>
    
    <h1>beachgirl.pics</h1>
    <p>Bienvenido al Paraíso</p>
    
    <div class="carousel">
        <h2>Carrusel - 40 imágenes</h2>
        <div id="carousel" class="carousel-track"></div>
    </div>
    
    <div class="gallery">
        <h2>Galería - 40 imágenes</h2>
        <div id="gallery" class="gallery-grid"></div>
    </div>
    
    <script src="js/content-data2.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
