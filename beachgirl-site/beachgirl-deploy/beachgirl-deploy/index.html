<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeachGirl.pics - Bienvenido al Paraíso</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Dancing+Script:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navegación Superior -->
    <nav class="navbar">
        <a href="/" class="nav-link active">Home</a>
        <a href="#premium" class="nav-link">Premium</a>
        <a href="#videos" class="nav-link">Videos</a>
        <a href="#subscriptions" class="nav-link">Subscriptions</a>
    </nav>

    <!-- Banner Principal con Título -->
    <header class="main-banner">
        <div class="banner-content">
            <h1 class="site-title">beachgirl.pics</h1>
            <p class="site-subtitle">Bienvenido al Paraíso</p>
        </div>
        <div class="banner-images" id="bannerRotator"></div>
    </header>

    <!-- Carrusel de 40 Imágenes -->
    <section class="carousel-section">
        <h2 class="section-title">Galería Destacada - 40 Fotos</h2>
        <div class="carousel-container">
            <button class="carousel-btn prev" onclick="moveCarousel(-1)">❮</button>
            <div class="carousel-wrapper">
                <div id="carousel" class="carousel-track"></div>
            </div>
            <button class="carousel-btn next" onclick="moveCarousel(1)">❯</button>
        </div>
    </section>

    <!-- Galería Principal de 40 Imágenes -->
    <section class="gallery-section">
        <h2 class="section-title">Explora el Paraíso - Galería Principal</h2>
        <div id="mainGallery" class="gallery-grid"></div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
        <p>&copy; 2025 BeachGirl.pics - Premium Beach Paradise Gallery</p>
        <p>Repositorio: <a href="https://github.com/Oriol7272/beachgirl.pics" target="_blank">github.com/Oriol7272/beachgirl.pics</a></p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
