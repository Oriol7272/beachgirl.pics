<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeachGirl.pics - Bienvenido al Paraíso</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            text-align: center;
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            padding: 10px 20px;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        nav a:hover, nav a.active {
            background: rgba(255,255,255,0.3);
        }
        h1 {
            font-size: 72px;
            margin: 20px 0;
            text-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 28px;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            flex: 1;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .gallery-item {
            aspect-ratio: 4/5;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .gallery-item:hover {
            transform: scale(1.05);
        }
        footer {
            background: rgba(0,0,0,0.3);
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="#" class="active">Home</a>
            <a href="#">Premium</a>
            <a href="#">Videos</a>
            <a href="#">Subscriptions</a>
        </nav>
        <h1>beachgirl.pics</h1>
        <p class="subtitle">Bienvenido al Paraíso</p>
    </header>
    
    <div class="container">
        <h2 style="text-align: center; margin-bottom: 30px;">Galería de Muestra</h2>
        <div class="gallery" id="gallery"></div>
    </div>
    
    <footer>
        <p>&copy; 2025 BeachGirl.pics - All Rights Reserved</p>
    </footer>
    
    <script>
        // Crear galería de muestra
        const gallery = document.getElementById('gallery');
        for(let i = 1; i <= 40; i++) {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.textContent = `Imagen ${i}`;
            gallery.appendChild(item);
        }
    </script>
</body>
</html>
