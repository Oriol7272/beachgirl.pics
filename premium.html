<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Photos - IbizaGirl.pics</title>
    
    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=AfQEdiielw5fm3wF08p9pcxwqR3gPz82YRNUTKY4A8WNG9AktiGsDNyr2i7BsjVzSwwpeCwR7Tt7DPq5&currency=EUR"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(0,0,0,0.3);
            padding: 20px 0;
            text-align: center;
        }
        
        .logo { 
            font-size: 2em; 
            margin-bottom: 10px; 
        }
        
        .nav {
            margin-top: 15px;
        }
        
        .nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            transition: background 0.3s;
            display: inline-block;
        }
        
        .nav a:hover { 
            background: rgba(255,255,255,0.3); 
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .premium-info {
            text-align: center;
            margin: 30px 0;
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
        }
        
        .premium-info h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
        }
        
        .price-tag {
            font-size: 2em;
            color: #ff4757;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        
        .photo-card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s;
            cursor: pointer;
        }
        
        .photo-card:hover { 
            transform: scale(1.05); 
        }
        
        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            filter: blur(8px);
            transition: filter 0.3s;
        }
        
        .photo-card.unlocked img { 
            filter: none; 
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
        }
        
        .photo-card.unlocked .overlay { 
            display: none; 
        }
        
        .lock-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .unlock-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        
        .unlock-btn:hover {
            background: #ff3838;
        }
        
        .language-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .language-selector select {
            padding: 8px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        
        .close-btn {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .close-btn:hover {
            color: #333;
        }
        
        #paypal-button-container {
            margin-top: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .placeholder-img {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2em;
        }
        
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
            
            .premium-info h1 {
                font-size: 2em;
            }
            
            .nav a {
                margin: 5px;
                padding: 6px 12px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <!-- Language Selector -->
    <div class="language-selector">
        <select id="languageSelect">
            <option value="es">Español</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="fr">Français</option>
        </select>
    </div>

    <div class="header">
        <div class="logo">🌴 IbizaGirl.pics 🌴</div>
        <div class="nav">
            <a href="/">Home</a>
            <a href="/gallery.html">Gallery</a>
            <a href="/premium.html">Premium</a>
            <a href="/videos.html">Videos</a>
            <a href="/subscription.html">Subscribe</a>
        </div>
    </div>

    <div class="container">
        <div class="premium-info">
            <h1 id="premiumTitle">💎 Premium Photos</h1>
            <div class="price-tag">€0.10</div>
            <p id="premiumDesc">Exclusive high-quality photos from Ibiza</p>
            <p id="totalPhotos">200+ premium photos available</p>
        </div>

        <div class="loading" id="loadingSection">
            <div class="spinner"></div>
            <p id="loadingText">Loading premium content...</p>
        </div>

        <div class="gallery-grid" id="premiumGrid" style="display: none;">
            <!-- Premium photos will be loaded here -->
        </div>
    </div>

    <!-- Payment Modal -->
    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle">Unlock Premium Photo</h3>
            <p id="modalDesc">Pay €0.10 to unlock this exclusive photo</p>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <script>
        // Load content data
        function loadScript(src) {
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = () => {
                    console.log(`✅ Loaded: ${src}`);
                    resolve();
                };
                script.onerror = () => {
                    console.warn(`⚠️ Failed to load: ${src}`);
                    resolve();
                };
                document.head.appendChild(script);
            });
        }
        
        // Load premium content
        Promise.all([
            loadScript('content-data3.js'),
            loadScript('content-data4.js')
        ]).then(() => {
            setTimeout(loadPremiumPhotos, 500);
        });
    </script>

    <script>
        const translations = {
            es: {
                premiumTitle: "💎 Fotos Premium",
                premiumDesc: "Fotos exclusivas de alta calidad desde Ibiza",
                totalPhotos: "200+ fotos premium disponibles",
                unlockText: "€0.10 - Desbloquear",
                modalTitle: "Desbloquear Foto Premium",
                modalDesc: "Paga €0.10 para desbloquear esta foto exclusiva",
                loadingText: "Cargando contenido premium...",
                paymentSuccess: "¡Pago exitoso! Foto desbloqueada.",
                paymentError: "Error en el pago. Por favor intenta de nuevo."
            },
            en: {
                premiumTitle: "💎 Premium Photos",
                premiumDesc: "Exclusive high-quality photos from Ibiza",
                totalPhotos: "200+ premium photos available",
                unlockText: "€0.10 - Unlock",
                modalTitle: "Unlock Premium Photo",
                modalDesc: "Pay €0.10 to unlock this exclusive photo",
                loadingText: "Loading premium content...",
                paymentSuccess: "Payment successful! Photo unlocked.",
                paymentError: "Payment failed. Please try again."
            },
            de: {
                premiumTitle: "💎 Premium-Fotos",
                premiumDesc: "Exklusive hochwertige Fotos aus Ibiza",
                totalPhotos: "200+ Premium-Fotos verfügbar",
                unlockText: "€0.10 - Freischalten",
                modalTitle: "Premium-Foto freischalten",
                modalDesc: "Zahlen Sie €0.10, um dieses exklusive Foto freizuschalten",
                loadingText: "Premium-Inhalte werden geladen...",
                paymentSuccess: "Zahlung erfolgreich! Foto freigeschaltet.",
                paymentError: "Zahlung fehlgeschlagen. Bitte versuchen Sie es erneut."
            },
            it: {
                premiumTitle: "💎 Foto Premium",
                premiumDesc: "Foto esclusive di alta qualità da Ibiza",
                totalPhotos: "200+ foto premium disponibili",
                unlockText: "€0.10 - Sblocca",
                modalTitle: "Sblocca Foto Premium",
                modalDesc: "Paga €0.10 per sbloccare questa foto esclusiva",
                loadingText: "Caricamento contenuti premium...",
                paymentSuccess: "Pagamento riuscito! Foto sbloccata.",
                paymentError: "Pagamento fallito. Riprova."
            },
            fr: {
                premiumTitle: "💎 Photos Premium",
                premiumDesc: "Photos exclusives de haute qualité d'Ibiza",
                totalPhotos: "200+ photos premium disponibles",
                unlockText: "€0.10 - Débloquer",
                modalTitle: "Débloquer Photo Premium",
                modalDesc: "Payez €0.10 pour débloquer cette photo exclusive",
                loadingText: "Chargement du contenu premium...",
                paymentSuccess: "Paiement réussi! Photo débloquée.",
                paymentError: "Échec du paiement. Veuillez réessayer."
            }
        };

        let currentLanguage = 'es';
        let selectedPhoto = null;
        let unlockedPhotos = JSON.parse(localStorage.getItem('unlockedPhotos') || '[]');
        let premiumPhotos = [];

        // Create placeholder
        function createPlaceholder(text = "💎") {
            const div = document.createElement('div');
            div.className = 'placeholder-img';
            div.textContent = text;
            return div;
        }

        function changeLanguage() {
            currentLanguage = document.getElementById('languageSelect').value;
            const t = translations[currentLanguage] || translations.en;
            
            document.getElementById('premiumTitle').textContent = t.premiumTitle;
            document.getElementById('premiumDesc').textContent = t.premiumDesc;
            document.getElementById('totalPhotos').textContent = t.totalPhotos;
            document.getElementById('modalTitle').textContent = t.modalTitle;
            document.getElementById('modalDesc').textContent = t.modalDesc;
            document.getElementById('loadingText').textContent = t.loadingText;
            
            // Update unlock buttons
            const unlockBtns = document.querySelectorAll('.unlock-btn');
            unlockBtns.forEach(btn => {
                if (!btn.dataset.unlocked) {
                    btn.textContent = t.unlockText;
                }
            });
            
            localStorage.setItem('preferred-language', currentLanguage);
        }

        function loadPremiumPhotos() {
            const grid = document.getElementById('premiumGrid');
            const loading = document.getElementById('loadingSection');
            const t = translations[currentLanguage] || translations.en;
            
            try {
                // Combine premium images
                if (typeof PREMIUM_IMAGES_PART1 !== 'undefined' && typeof PREMIUM_IMAGES_PART2 !== 'undefined') {
                    premiumPhotos = [...PREMIUM_IMAGES_PART1, ...PREMIUM_IMAGES_PART2].slice(0, 50);
                    console.log(`💎 Loaded ${premiumPhotos.length} premium photos`);
                } else if (typeof PREMIUM_IMAGES_PART1 !== 'undefined') {
                    premiumPhotos = PREMIUM_IMAGES_PART1.slice(0, 50);
                } else {
                    // Use placeholders
                    console.warn('⚠️ Premium images not found, using placeholders');
                    premiumPhotos = Array(50).fill(null).map((_, i) => `premium-placeholder-${i}`);
                }
                
                displayPremiumPhotos();
            } catch (error) {
                console.error('Error loading premium photos:', error);
                loading.innerHTML = '<p style="color: #ff4757;">Error loading premium content</p>';
            }
        }

        function displayPremiumPhotos() {
            const grid = document.getElementById('premiumGrid');
            const loading = document.getElementById('loadingSection');
            const t = translations[currentLanguage] || translations.en;
            
            grid.innerHTML = '';
            
            premiumPhotos.forEach((photo, index) => {
                const photoCard = document.createElement('div');
                photoCard.className = 'photo-card';
                
                // Check if unlocked
                const isUnlocked = unlockedPhotos.includes(photo) || unlockedPhotos.includes('all');
                if (isUnlocked) {
                    photoCard.classList.add('unlocked');
                }
                
                if (photo.includes('placeholder')) {
                    photoCard.appendChild(createPlaceholder(`💎 ${index + 1}`));
                } else {
                    const img = document.createElement('img');
                    img.src = photo;
                    img.alt = `Premium Photo ${index + 1}`;
                    img.loading = 'lazy';
                    img.onerror = function() {
                        const placeholder = createPlaceholder(`💎 ${index + 1}`);
                        this.parentElement.replaceChild(placeholder, this);
                    };
                    photoCard.appendChild(img);
                }
                
                if (!isUnlocked) {
                    const overlay = document.createElement('div');
                    overlay.className = 'overlay';
                    
                    const lockIcon = document.createElement('div');
                    lockIcon.className = 'lock-icon';
                    lockIcon.textContent = '🔒';
                    
                    const unlockBtn = document.createElement('button');
                    unlockBtn.className = 'unlock-btn';
                    unlockBtn.textContent = t.unlockText;
                    unlockBtn.onclick = () => openPaymentModal(photo);
                    
                    overlay.appendChild(lockIcon);
                    overlay.appendChild(unlockBtn);
                    photoCard.appendChild(overlay);
                }
                
                grid.appendChild(photoCard);
            });
            
            loading.style.display = 'none';
            grid.style.display = 'grid';
        }

        function openPaymentModal(photo) {
            selectedPhoto = photo;
            document.getElementById('paymentModal').style.display = 'flex';
            initPayPal();
        }

        function closeModal() {
            document.getElementById('paymentModal').style.display = 'none';
            // Clear PayPal button container
            document.getElementById('paypal-button-container').innerHTML = '';
        }

        function initPayPal() {
            const t = translations[currentLanguage] || translations.en;
            document.getElementById('paypal-button-container').innerHTML = '';
            
            paypal.Buttons({
                createOrder: function(data, actions) {
                    return actions.order.create({
                        purchase_units: [{
                            amount: {
                                value: '0.10'
                            },
                            description: 'Premium Photo Access'
                        }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        // Unlock the photo
                        unlockedPhotos.push(selectedPhoto);
                        localStorage.setItem('unlockedPhotos', JSON.stringify(unlockedPhotos));
                        
                        alert(t.paymentSuccess);
                        closeModal();
                        displayPremiumPhotos(); // Refresh display
                    });
                },
                onError: function(err) {
                    console.error('PayPal error:', err);
                    const t = translations[currentLanguage] || translations.en;
                    alert(t.paymentError);
                }
            }).render('#paypal-button-container');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            const savedLang = localStorage.getItem('preferred-language') || 'es';
            document.getElementById('languageSelect').value = savedLang;
            changeLanguage();
            
            document.getElementById('languageSelect').addEventListener('change', changeLanguage);
            
            console.log('💎 Premium page initialized');
        });
    </script>
</body>
</html>
